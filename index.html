<!DOCTYPE html>
<html lang="ca">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="C:/MEI és el portafolis personal, on es pot trobar projectes, contactes i un joc 2D." />
    <meta name="author" content="Mei Ying Mullen" />
    <title>C:/MEI</title>
    <link rel="icon" href="img/isotip.png" type="image/png" />
    <link rel="stylesheet" href="styles.css" />
</head>

<body>
    <header class="topbar">
        <img class="logo" src="img/logotip.png" alt="C:/MEI" />
    </header>

    <main class="desktop" aria-label="Escriptori">
        <div class="folders">

            <a class="folder" href="readme.html" aria-label="Obrir README.md">
                <img src="img/folder.webp" alt="carpeta" loading="lazy" />
                <span class="folder-name">README.md</span>
            </a>

            <a class="folder" href="projectes.html" aria-label="Obrir PROJECTES/">
                <img src="img/folder.webp" alt="carpeta" loading="lazy" />
                <span class="folder-name">PROJECTES/</span>
            </a>

            <a class="folder game" href="https://github.com/memugr/animal_escape/archive/refs/tags/1.0.zip" aria-label="Zip del joc Animal Escape" title="Descarrega el joc!">
                <img src="img/folder.webp" alt="carpeta" loading="lazy" />
                <span class="folder-name">animal_escape.exe</span>
                <span class="folder-download">↓ descarrega</span>
            </a>

            <a class="folder" href="contacte.html" aria-label="Obrir CONTACTE/">
                <img src="img/folder.webp" alt="carpeta" loading="lazy" />
                <span class="folder-name">CONTACTE/</span>
            </a>

        </div>
    </main>

    <div class="cat-container">
        <img src="img/cat.svg" class="cat-svg" alt="gat" aria-hidden="true" />
    </div>


    <footer class="taskbar">
        <span class="path"><span class="dot"></span>C:/MEI/escriptori</span>
    </footer>

    <script src="script.js"></script>
</body>
</html>
