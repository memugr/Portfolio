<!DOCTYPE html>
<html lang="ca">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description"
        content="C:/MEI és el portafolis personal, on es pot trobar projectes, contactes i un joc 2D." />
    <meta name="author" content="Mei Ying Mullen" />
    <title>C:/MEI</title>
    <link rel="icon" type="image/png" href="img/isotip.png" />
    <link rel="stylesheet" href="styles.css" />
</head>

<body>
    <header class="topbar">
        <img class="logo" src="img/logotip.png" alt="C:/MEI" />
    </header>

    <main class="desktop" aria-label="Escriptori">
        <div class="folders">

            <a class="folder" href="#" onclick="openModal('modal-readme'); return false;" aria-label="Obrir README.md">
                <img src="img/folder.webp" alt="carpeta" loading="lazy" />
                <span class="folder-name">README.md</span>
            </a>

            <a class="folder" href="#" onclick="openModal('modal-projectes'); return false;"
                aria-label="Obrir PROJECTES/">
                <img src="img/folder.webp" alt="carpeta" loading="lazy" />
                <span class="folder-name">PROJECTES/</span>
            </a>

            <a class="folder" href="#" onclick="openModal('modal-game'); return false;"
                aria-label="Zip del joc Animal Escape" title="Descarrega el joc!">
                <img src="img/folder.webp" alt="carpeta" loading="lazy" />
                <span class="folder-name">animal_escape.exe</span>
            </a>

            <a class="folder" href="#" onclick="openModal('modal-contacte'); return false;"
                aria-label="Obrir CONTACTE/">
                <img src="img/folder.webp" alt="carpeta" loading="lazy" />
                <span class="folder-name">CONTACTE/</span>
            </a>

            <a class="folder" href="resources/manual_identitat.pdf" target="_blank"
                aria-label="Enllaç extern a manual_identitat.pdf">
                <img class="folder" src="img/pdf.svg" alt="pdf" loading="lazy" />
                <span class="folder-name">manual_identitat.pdf</span>
            </a>

        </div>
    </main>

    <div class="cat-container">
        <img src="img/cat.svg" class="cat-svg" alt="gat" aria-hidden="true" />
    </div>

    <footer class="taskbar">
        <span class="path">
            <span class="dot"></span>
            <span class="path-full">C:/MEI/escriptori/ziggy&nbsp;>&nbsp;</span>
            <span class="path-short">ziggy&nbsp;>&nbsp;</span>
            <span id="message-cat"></span>
        </span>
    </footer>

    <div id="modals-container"></div>

    <script src="script.js"></script>
</body>

</html>
